schema: spec-driven

context: |
  Tech stack: Python 3 (single language), requests, beautifulsoup4, google-genai, python-dotenv
  Architecture: Python pipeline that fetches, summarizes (Gemini structured JSON),
    caches (SQLite, direct sqlite3 — no subprocess), and sends Hacker News digests
    to Telegram and WhatsApp.
  Testing: stdlib unittest (python -m unittest); test_hn_summary.py
  Style: Not found
  History: Originally a Node.js orchestrator that shelled out to a Python helper
    (cache_helper.py) via execFileSync for every SQLite op — spawning a process per
    cache read/write. Migrated to single-language Python to remove that coupling and
    the per-operation subprocess overhead.

strict_tdd: false

testing:
  strict_tdd: disabled
  test_runner:
    command: none
    framework: none
  layers:
    unit: false
    integration: false
    e2e: false
  coverage:
    available: false
    command: none
  quality:
    linter: false
    type_checker: false
    formatter: false

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)

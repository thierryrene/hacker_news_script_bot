name: Hacker News Daily Summary

on:
  schedule:
    - cron: '0 11 * * *' # Executa todo dia às 11:00 UTC (8:00 BRT)
  workflow_dispatch: # Permite execução manual pela aba Actions no GitHub

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: 🔧 Instalar dependências
        run: pip install -r requirements.txt

      - name: 🚀 Executar Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          EVOLUTION_API_URL: ${{ secrets.EVOLUTION_API_URL }}
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          EVOLUTION_API_INSTANCE: ${{ secrets.EVOLUTION_API_INSTANCE }}
          WHATSAPP_NUMBER: ${{ secrets.WHATSAPP_NUMBER }}
        run: python hn_summary.py

      - name: 💾 Commit and Push Cache
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache.db
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "chore(auto): daily cache sync [skip ci]"
            git push
          fi

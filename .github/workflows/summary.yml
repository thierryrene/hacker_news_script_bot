name: Hacker News Daily Summary

on:
  schedule:
    - cron: '0 11 * * *' # Executa todo dia às 11:00 UTC (8:00 BRT)
  workflow_dispatch: # Permite execução manual pela aba Actions no GitHub

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 🔧 Instalar dependências
        run: pnpm install --no-frozen-lockfile

      - name: 🚀 Executar Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          EVOLUTION_API_URL: ${{ secrets.EVOLUTION_API_URL }}
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          EVOLUTION_API_INSTANCE: ${{ secrets.EVOLUTION_API_INSTANCE }}
          WHATSAPP_NUMBER: ${{ secrets.WHATSAPP_NUMBER }}
        run: pnpm start
